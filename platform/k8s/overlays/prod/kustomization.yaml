apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tamani-prod
resources:
  - ../../base
# Prod pins image digests by commit sha; promotion is a PR that updates
# these tags (Argo CD Image Updater automates dev later, per the plan).
images:
  - name: tamani-api
    newName: ghcr.io/maicymxtim/tamani-api
    newTag: main
  - name: tamani-gateway
    newName: ghcr.io/maicymxtim/tamani-gateway
    newTag: main
  - name: tamani-worker
    newName: ghcr.io/maicymxtim/tamani-worker
    newTag: main
patches:
  - target:
      kind: Deployment
      name: tamani-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: tamani-gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
