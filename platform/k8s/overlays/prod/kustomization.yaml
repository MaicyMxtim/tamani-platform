apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tamani-prod
resources:
  - ../../base
# Prod pins image digests by commit sha; promotion is a PR that updates
# these tags (Argo CD Image Updater automates dev later, per the plan).
images:
  - name: tamani-api
    newName: ghcr.io/maicymxtim/tamani-api
    newTag: 01734e5aa54037a8b99c451952c344a950948fcf
  - name: tamani-gateway
    newName: ghcr.io/maicymxtim/tamani-gateway
    newTag: 01734e5aa54037a8b99c451952c344a950948fcf
  - name: tamani-worker
    newName: ghcr.io/maicymxtim/tamani-worker
    newTag: 01734e5aa54037a8b99c451952c344a950948fcf
# Single replicas while the node is a 2 GB t3.small; returns to 2 with
# the t3.medium upgrade when the observability stack lands (Phase 7).
patches:
  - target:
      kind: Deployment
      name: tamani-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: tamani-gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
