# The provider key never exists in Git or in a human's kubectl history:
# it lives in AWS SSM Parameter Store and ESO materialises it in-cluster,
# refreshing hourly so rotation in SSM propagates on its own.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
spec:
  provider:
    aws:
      service: ParameterStore
      region: eu-west-2
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: eso-aws-creds
            namespace: external-secrets
            key: access-key-id
          secretAccessKeySecretRef:
            name: eso-aws-creds
            namespace: external-secrets
            key: secret-access-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: anthropic
  namespace: tamani-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: anthropic
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: /tamani/anthropic-api-key
