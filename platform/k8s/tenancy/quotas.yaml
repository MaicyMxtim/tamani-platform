# ResourceQuota caps each environment; LimitRange supplies defaults so a
# pod without explicit requests still lands inside the quota.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: env-quota
  namespace: tamani-dev
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 3Gi
    limits.cpu: "4"
    limits.memory: 5Gi
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: env-defaults
  namespace: tamani-dev
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
---
apiVersion: v1
kind: ResourceQuota
