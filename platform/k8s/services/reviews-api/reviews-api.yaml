# reviews-api — generated by the tamani golden path gp-1.0.0.
# Correctness by default: a service scaffolded this way cannot ship
# without probes, limits, telemetry, network policy and monitoring.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reviews-api
  namespace: tamani-dev
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviews-api
  namespace: tamani-dev
  labels: { app: reviews-api, golden-path: "gp-1.0.0" }
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  selector:
    matchLabels: { app: reviews-api }
  template:
    metadata:
      labels: { app: reviews-api }
    spec:
      serviceAccountName: reviews-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/maicymxtim/reviews-api:main
          imagePullPolicy: Always
          ports: [{ containerPort: 8000 }]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 250m, memory: 192Mi }
          startupProbe:
            httpGet: { path: /health/live, port: 8000 }
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health/live, port: 8000 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: reviews-api
  namespace: tamani-dev
  labels: { app: reviews-api }
spec:
  selector: { app: reviews-api }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: reviews-api
  namespace: tamani-dev
spec:
  podSelector:
    matchLabels: { app: reviews-api }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8000
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: reviews-api
  namespace: tamani-dev
spec:
  selector:
    matchLabels: { app: reviews-api }
  endpoints:
    - targetPort: 8000
      path: /metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: reviews-api-slo
  namespace: tamani-dev
spec:
  groups:
    - name: reviews-api.alerts
      rules:
        - alert: ReviewsApiHighErrorRate
          expr: |
            (sum(rate(http_requests_total{namespace="tamani-dev", handler!="/metrics", status=~"5..", job="reviews-api"}[5m])) or vector(0))
            / clamp_min(sum(rate(http_requests_total{namespace="tamani-dev", job="reviews-api"}[5m])), 1e-9) > 0.05
          for: 10m
          labels: { severity: warning, namespace: tamani-dev }
          annotations:
            summary: "reviews-api error rate above 5%"
            runbook: runbooks/reviews-api.md
