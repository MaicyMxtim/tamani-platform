apiVersion: v1
kind: ServiceAccount
metadata:
  name: tamani-api
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tamani-api
  labels: { app: tamani-api }
spec:
  replicas: 1
  selector:
    matchLabels: { app: tamani-api }
  template:
    metadata:
      labels: { app: tamani-api }
    spec:
      serviceAccountName: tamani-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: tamani-api
          ports: [{ containerPort: 8000 }]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          startupProbe:
            httpGet: { path: /health/startup, port: 8000 }
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health/live, port: 8000 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tamani-api
spec:
  selector: { app: tamani-api }
  ports: [{ port: 80, targetPort: 8000 }]
---
# The API serves read traffic from its bundled snapshot: ingress from
# anywhere in-namespace (the edge arrives with ingress-nginx later),
# egress nothing beyond DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tamani-api
spec:
  podSelector:
    matchLabels: { app: tamani-api }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 8000
