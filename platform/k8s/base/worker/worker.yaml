apiVersion: v1
kind: ServiceAccount
metadata:
  name: tamani-worker
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tamani-worker
  labels: { app: tamani-worker }
spec:
  replicas: 1
  selector:
    matchLabels: { app: tamani-worker }
  template:
    metadata:
      labels: { app: tamani-worker }
    spec:
      serviceAccountName: tamani-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: worker
          image: tamani-worker
          env:
            - name: NATS_URL
              value: nats://nats:4222
            - name: GATEWAY_URL
              value: http://tamani-gateway
            - name: GATEWAY_KEY
              value: dev-local-key
            - name: REDIS_URL
              value: redis://redis:6379/0
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
# No ingress at all; egress only to the things it genuinely calls.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tamani-worker
spec:
  podSelector:
    matchLabels: { app: tamani-worker }
  policyTypes: [Ingress, Egress]
  egress:
    - to:
        - podSelector:
            matchLabels: { app: tamani-gateway }
      ports: [{ port: 8001 }]
    - to:
        - podSelector:
            matchLabels: { app: nats }
      ports: [{ port: 4222 }]
    - to:
        - podSelector:
            matchLabels: { app: redis }
      ports: [{ port: 6379 }]
