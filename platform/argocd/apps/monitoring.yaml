apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.5.1
    helm:
      valuesObject:
        # Trimmed for a single 4 GB node: short retention, tight limits.
        prometheus:
          prometheusSpec:
            retention: 24h
            resources:
              requests: { cpu: 100m, memory: 400Mi }
              limits: { memory: 700Mi }
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
        alertmanager:
          alertmanagerSpec:
            resources:
              requests: { cpu: 10m, memory: 32Mi }
              limits: { memory: 64Mi }
        grafana:
          adminPassword: tamani-grafana
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { memory: 192Mi }
          sidecar:
            dashboards: { enabled: true, searchNamespace: ALL }
          additionalDataSources:
            - name: Prometheus
              type: prometheus
              uid: prometheus
              isDefault: true
              url: http://monitoring-kube-prometheus-prometheus:9090
            - name: Loki
              type: loki
              uid: loki
              url: http://loki.monitoring:3100
        kube-state-metrics:
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 96Mi }
        nodeExporter: { enabled: true }
        # One-node cluster: no HA components needed.
        defaultRules:
          rules:
            alertmanager: false
            etcd: false
            kubeProxy: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
