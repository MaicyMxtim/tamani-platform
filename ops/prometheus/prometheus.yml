global:
  scrape_interval: 15s

scrape_configs:
  - job_name: tamani-api
    static_configs:
      - targets: ["api:8000"]
  - job_name: tamani-gateway
    static_configs:
      - targets: ["gateway:8001"]
  - job_name: nats
    metrics_path: /metrics
    static_configs:
      - targets: ["nats:8222"]
